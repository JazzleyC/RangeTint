<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="680" viewBox="0 0 1080 680" role="img" aria-labelledby="title desc">
  <title id="title">Range Tint settings</title>
  <desc id="desc">Range Tint settings with frame ranges, colors, border controls, and one configurable key combination per action.</desc>
  <rect width="1080" height="680" rx="18" fill="#171a1e"/>
  <rect x="178" y="34" width="724" height="612" rx="12" fill="#292e34" stroke="#444c54" stroke-width="2"/>
  <rect x="178" y="34" width="724" height="54" rx="12" fill="#343a41"/>
  <text x="208" y="68" fill="#f0f2f4" font-family="Segoe UI,Arial,sans-serif" font-size="21" font-weight="650">Range Tint 3.2.2</text>
  <g font-family="Segoe UI,Arial,sans-serif" font-size="16" fill="#cbd2d7">
    <text x="216" y="126">Frame ranges</text>
    <text x="216" y="174">Inside range</text>
    <text x="216" y="222">Outside range</text>
    <text x="216" y="270">Border thickness</text>
    <text x="216" y="318">Timeline opacity</text>
  </g>
  <g>
    <rect x="430" y="102" width="426" height="34" rx="5" fill="#1c2024" stroke="#59636c"/><text x="446" y="125" fill="#eef1f3" font-family="Segoe UI,Arial,sans-serif" font-size="15">1001-1050, 1075-1100</text>
    <rect x="430" y="150" width="426" height="34" rx="5" fill="#35c878"/><text x="446" y="173" fill="#fff" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">#35C878</text>
    <rect x="430" y="198" width="426" height="34" rx="5" fill="#d64f5c"/><text x="446" y="221" fill="#fff" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">#D64F5C</text>
    <rect x="430" y="246" width="426" height="34" rx="5" fill="#1c2024" stroke="#59636c"/><text x="446" y="269" fill="#eef1f3" font-family="Segoe UI,Arial,sans-serif" font-size="15">5 px</text>
    <rect x="430" y="294" width="426" height="34" rx="5" fill="#1c2024" stroke="#59636c"/><text x="446" y="317" fill="#eef1f3" font-family="Segoe UI,Arial,sans-serif" font-size="15">78%</text>
  </g>
  <line x1="214" y1="358" x2="866" y2="358" stroke="#485058"/>
  <text x="216" y="393" fill="#f0f2f4" font-family="Segoe UI,Arial,sans-serif" font-size="17" font-weight="700">Keyboard shortcuts</text>
  <g font-family="Segoe UI,Arial,sans-serif" font-size="16" fill="#cbd2d7">
    <text x="216" y="438">Open settings</text>
    <text x="216" y="486">Toggle overlay</text>
    <text x="216" y="534">Refresh Viewers</text>
  </g>
  <g font-family="Consolas,monospace" font-size="15" fill="#eef1f3">
    <rect x="430" y="414" width="426" height="34" rx="5" fill="#1c2024" stroke="#d39436"/><text x="446" y="437">Ctrl+Alt+R</text>
    <rect x="430" y="462" width="426" height="34" rx="5" fill="#1c2024" stroke="#59636c"/><text x="446" y="485">Ctrl+Alt+T</text>
    <rect x="430" y="510" width="426" height="34" rx="5" fill="#1c2024" stroke="#59636c"/><text x="446" y="533" fill="#8e989f">Unassigned</text>
  </g>
  <rect x="214" y="568" width="652" height="1" fill="#485058"/>
  <text x="216" y="605" fill="#aeb7bd" font-family="Segoe UI,Arial,sans-serif" font-size="15">Created by</text>
  <text x="300" y="605" fill="#55d88b" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">JazzleyVFX · jazzley.nl</text>
  <rect x="746" y="586" width="110" height="36" rx="6" fill="#276b43" stroke="#55d88b"/>
  <text x="801" y="610" text-anchor="middle" fill="#fff" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="700">SAVE</text>
</svg>

